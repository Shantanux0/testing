spring.application.name=PeerToPeerLearning
# ---------------------------
# Server Configuration
# ---------------------------
server.port=${PORT:8080}

# ---------------------------
# Database Configuration
# ---------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillswap}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:skillswap_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root@123}





jwt.secret.key=${JWT_SECRET_KEY:thisisthesecretkeyievercreatedinmydevelopmentcareer}

# ---------------------------
# Hibernate / JPA
# ---------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#---------------------Mail-------------
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${MAIL_FROM:}

# Groq AI Configuration
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions

# Disable Thymeleaf template location warning
spring.thymeleaf.check-template-location=false
